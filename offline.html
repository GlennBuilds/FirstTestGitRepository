<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#173ea5" />
    <title>Balkan2026 offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        color: #172033;
        background: #f4f6fa;
      }

      main {
        max-width: 520px;
        border: 1px solid #dce3ef;
        border-radius: 18px;
        background: #ffffff;
        padding: 22px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      h1 {
        margin: 0 0 8px;
        color: #173ea5;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #586377;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>De Balkan2026 app is offline, en dit onderdeel stond nog niet in de lokale cache. Open de routekaart een keer met internet zodat alle reisinfo beschikbaar blijft.</p>
    </main>
  </body>
</html>
